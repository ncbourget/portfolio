<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>3D Viewer</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewer-container {
      width: min(90vw, 700px);
      aspect-ratio: 1 / 1;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: transparent;
    }
  </style>
</head>
 
<body>

  <div class="viewer-container">
    <model-viewer
      src="./models/box.glb"

      camera-controls
      auto-rotate
      rotation-per-second="22deg"

      interaction-prompt="none"

      disable-pan
      shadow-intensity="1"
      exposure="1.1"

      touch-action="pan-y">

    </model-viewer>
  </div>

</body>
</html>
